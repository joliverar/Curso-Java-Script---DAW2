<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UD2E3 - Simon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Juego de memoria Simon</h1>

    <div class="contenedor">
        <!-- Columna izquierda: juego -->
        <div class="zona-juego">
            <table class="tabla-simon">
                <tr>
                    <td>
                        <button id="verde" class="boton-color apagado" data-color="verde"></button>
                    </td>
                    <td>
                        <button id="rojo" class="boton-color apagado" data-color="rojo"></button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button id="azul" class="boton-color apagado" data-color="azul"></button>
                    </td>
                    <td>
                        <button id="amarillo" class="boton-color apagado" data-color="amarillo"></button>
                    </td>
                </tr>
            </table>
        </div>

        <!-- Columna derecha: control e información -->
        <div class="zona-control">
            <div class="bloque">
                <label for="tiempoLuz">Milisegundos encendida:</label>
                <input type="number" id="tiempoLuz" value="700" min="100" step="100">
            </div>

            <div class="bloque">
                <label for="tiempoEspera">Milisegundos entre encendidos:</label>
                <input type="number" id="tiempoEspera" value="300" min="0" step="100">
            </div>

            <div class="bloque">
                <button id="btnComenzar">Comenzar juego</button>
            </div>

            <div class="bloque info">
                <p><strong>Mejor racha:</strong> <span id="mejorRacha">0</span></p>
                <p><strong>Partida actual:</strong> <span id="infoPartida">0 de 0</span></p>
                <p><strong>Estado:</strong> <span id="estadoJuego">parado</span></p>
                <p id="mensaje"></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
